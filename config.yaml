baseURL: https://mustafaalshehab.github.io
title: "Mustafa's Portfolio"

# Use Hugo modules for the Toha theme (pinned via go.mod)
module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: static/files
      target: static/files
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

# Manage languages
# https://gohugo.io/content-management/multilingual/
languages:
  en:
    locale: en-US
    label: English
    title: "Mustafa's Portfolio"
    weight: 1

defaultContentLanguage: en

# Allow raw HTML in markdown; control TOC depth
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# HTML + JSON required for client-side search
outputs:
  home:
    - HTML
    - RSS
    - JSON

enableEmoji: true

params:
  background: /images/tech.jpg

  logo:
    main: /images/code.png
    inverted: /images/code.png
    favicon: /images/code.png

  # Source lives on develop; master only holds the published site
  gitRepo: https://github.com/MustafaAlshehab/MustafaAlshehab.github.io
  gitBranch: develop

  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system

    portfolio:
      enable: true

    blog:
      enable: false

    toc:
      enable: true

    analytics:
      enable: true
      services:
        enable: true
        goatCounter:
          code: mdev

  footer:
    enable: true
    navigation:
      enable: true
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: false
